    <!--
      ANTI-FLASH: detecta o tema ANTES do primeiro paint.
      Executa de forma síncrona (sem defer/async) para que o browser
      aplique a classe 'dark' e o background correto antes de renderizar
      qualquer pixel — eliminando o flash branco/preto.
    -->
    <script>
      (function () {
        try {
          var stored = localStorage.getItem('direto_theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var isDark = stored ? stored === 'dark' : prefersDark;
          if (isDark) {
            document.documentElement.classList.add('dark');
            document.documentElement.style.backgroundColor = '#0d0d12';
            document.documentElement.style.color = '#eeeef5';
          } else {
            document.documentElement.style.backgroundColor = '#f9f9fc';
            document.documentElement.style.color = '#1E1B4B';
          }
        } catch (e) {
          document.documentElement.style.backgroundColor = '#0d0d12';
        }
      })();
    </script>

    <!-- Remove o splash assim que o React montar -->
    <script>
      (function () {
        var splash = document.getElementById('lp-splash');
        if (!splash) return;
        var observer = new MutationObserver(function () {
          var root = document.getElementById('root');
          if (root && root.children.length > 0) {
            splash.classList.add('hidden');
            setTimeout(function () { splash.remove(); }, 350);
            observer.disconnect();
          }
        });
        observer.observe(document.getElementById('root'), { childList: true });
        // Fallback: remove após 5s caso algo falhe

      })();
